<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Insights | GCEK</title>
    <link rel="icon" href="https://img.icons8.com/fluency-systems-filled/48/0ea5e9/circuit.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #ffffff; 
            color: #111827; /* gray-900 */
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* Card Styles - Light Theme */
        .blog-card {
            background: #ffffff;
            border: 1px solid #e5e7eb; /* gray-200 */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blog-card:hover {
            border-color: #0ea5e9; /* Sky Blue */
            transform: translateY(-3px);
            background: #f0f9ff; /* sky-50 */
            box-shadow: 0 15px 30px -10px rgba(14, 165, 233, 0.2);
        }

        /* Reader View Styles */
        .post-title { 
            font-size: 3.5rem; 
            font-weight: 900; 
            line-height: 1.1; 
            margin-bottom: 1rem; 
            background: linear-gradient(90deg, #0ea5e9, #10b981); /* Blue to Green */
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .post-meta { 
            color: #64748b; /* slate-500 */
            font-size: 0.9rem; 
            margin-bottom: 2.5rem; 
            border-bottom: 1px solid #f1f5f9; 
            padding-bottom: 1.5rem; 
            display: flex;
            gap: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .post-body { 
            color: #374151; /* gray-700 */
            line-height: 1.8; 
            font-size: 1.15rem; 
        }
        .post-body h1, .post-body h2, .post-body h3 { 
            color: #111827; 
            margin-top: 2.5rem; 
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .post-body p { margin-bottom: 1.5rem; }
        
        /* Code blocks: Light tech aesthetic */
        .post-body code { 
            background: #f1f5f9; 
            padding: 2px 6px; 
            border-radius: 4px; 
            color: #0284c7; /* sky-600 */
            font-family: monospace;
            font-size: 0.9em;
        }
        
        .hidden { display: none; }
        .glass-nav { 
            backdrop-filter: blur(16px); 
            background: rgba(255, 255, 255, 0.85); 
            border-bottom: 1px solid #f1f5f9; 
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="/" class="font-black tracking-tighter text-xl text-gray-900 uppercase">
                QUANTUM CLUB<span class="text-emerald-500">.</span>
            </a>
            <button id="back-btn" onclick="showList()" class="hidden text-sm text-sky-600 font-bold hover:text-emerald-600 transition flex items-center gap-2">
                ← BACK TO ARCHIVE
            </button>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto">
            
            <div id="list-view">
                <header class="mb-16">
                    <h1 class="text-6xl font-black mb-4 tracking-tight text-gray-950">
                        Quantum <span class="text-emerald-500">Insights</span>
                    </h1>
                    <p class="text-gray-500 text-lg">Exploring the intersection of electronics, firmware, and quantum logic.</p>
                </header>

                <div id="blog-list" class="grid gap-6">
                    <div class="animate-pulse flex flex-col gap-4">
                        <div class="h-24 bg-gray-50 rounded-2xl border border-gray-100"></div>
                        <div class="h-24 bg-gray-50 rounded-2xl border border-gray-100"></div>
                    </div>
                </div>
            </div>

            <div id="reader-view" class="hidden">
                <article id="post-content" class="post-body">
                    </article>
            </div>

        </div>
    </main>

    <script>
        // CONFIGURATION
        const GITHUB_ORG = 'quantum-club-repo'; 
        const REPO_NAME = 'quantum-club-site';
        
        const blogList = document.getElementById('blog-list');
        const listView = document.getElementById('list-view');
        const readerView = document.getElementById('reader-view');
        const postContent = document.getElementById('post-content');
        const backBtn = document.getElementById('back-btn');

        function showList() {
            listView.classList.remove('hidden');
            readerView.classList.add('hidden');
            backBtn.classList.add('hidden');
            window.scrollTo(0,0);
        }

        async function readPost(downloadUrl) {
            listView.classList.add('hidden');
            readerView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            postContent.innerHTML = "<p class='text-sky-600 animate-pulse text-center py-20 font-bold tracking-widest'>DECODING DATA...</p>";

            try {
                const response = await fetch(downloadUrl);
                const rawText = await response.text();

                // Frontmatter Extraction
                const parts = rawText.split('---');
                let finalMarkdown = rawText;
                let metadata = {};

                if (parts.length >= 3) {
                    const yaml = parts[1];
                    finalMarkdown = parts.slice(2).join('---');
                    yaml.split('\n').forEach(line => {
                        const [key, ...val] = line.split(':');
                        if (key) metadata[key.trim()] = val.join(':').trim();
                    });
                }

                const dateDisplay = metadata.date ? new Date(metadata.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'Research Note';

                postContent.innerHTML = `
                    <h1 class="post-title capitalize">${metadata.title || 'Untitled Archive'}</h1>
                    <div class="post-meta">
                        <span class="text-sky-600">${metadata.author || 'RESEARCHER'}</span>
                        <span class="text-gray-300">/</span>
                        <span class="text-emerald-600">${dateDisplay}</span>
                    </div>
                    ${metadata.thumbnail ? `<img src="${metadata.thumbnail}" class="w-full h-auto max-h-[480px] object-cover rounded-3xl mb-12 border border-gray-100 shadow-xl">` : ''}
                    <div class="prose-container">
                        ${marked.parse(finalMarkdown)}
                    </div>
                `;
                window.scrollTo(0,0);
            } catch (err) {
                postContent.innerHTML = "<p class='text-red-500 font-bold'>ERROR: Failed to fetch the article from the repository.</p>";
            }
        }

        async function fetchBlogs() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_ORG}/${REPO_NAME}/contents/blog`);
                const files = await response.json();
                
                if(!Array.isArray(files)) throw new Error("Empty directory");

                const posts = files.filter(file => file.name.endsWith('.md'));

                if (posts.length === 0) {
                    blogList.innerHTML = "<p class='text-gray-400 text-center py-10 italic'>No insights published in this category yet.</p>";
                    return;
                }

                blogList.innerHTML = ''; 

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = "blog-card p-8 rounded-2xl cursor-pointer group";
                    
                    // Cleanup title from filename (e.g., 2026-04-14-quantum-logic.md -> quantum logic)
                    const displayTitle = post.name.replace('.md', '').split('-').filter(p => isNaN(p)).join(' ');

                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-bold capitalize text-gray-900 group-hover:text-sky-600 transition-colors">${displayTitle}</h2>
                                <p class="text-emerald-600 text-xs font-black mt-3 tracking-widest">READ FULL INSIGHT →</p>
                            </div>
                            <div class="text-gray-200 group-hover:text-sky-100 transition-colors">
                                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
                            </div>
                        </div>
                    `;
                    
                    card.onclick = () => readPost(post.download_url);
                    blogList.appendChild(card);
                });

            } catch (error) {
                blogList.innerHTML = "<p class='text-gray-400 text-center py-10'>Unable to sync with the research database.</p>";
            }
        }

        fetchBlogs();
    </script>
</body>
</html>
