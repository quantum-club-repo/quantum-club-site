<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog | Quantum Club GCEK</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#030712] text-white p-10">
    <nav class="mb-10"><a href="/" class="text-purple-400 font-bold">← Back to Home</a></nav>
    <h1 class="text-4xl font-bold mb-6">Quantum Insights</h1>
    
    <div id="blog-list" class="grid gap-6">
        <p id="loading" class="text-gray-500 italic">Scanning for new posts...</p>
    </div>

    <script>
        // Replace 'your-username' and 'your-repo' with your actual GitHub info
        // MUST match your screenshot exactly
const GITHUB_ORG = 'quantum-club-repo'; 
const REPO_NAME = 'quantum-club-site';
const blogContainer = document.getElementById('blog-list');

async function fetchBlogs() {
    try {
        // Updated URL to use the Organization path
        const response = await fetch(`https://api.github.com/repos/${GITHUB_ORG}/${REPO_NAME}/contents/blog`);
        const files = await response.json();

        // Filter out index.html so we only see the markdown posts
        const posts = files.filter(file => file.name.endsWith('.md'));

        if (posts.length === 0) {
            blogContainer.innerHTML = "<p class='text-gray-500'>No posts found.</p>";
            return;
        }

        blogContainer.innerHTML = ''; // Clear loading message

        posts.forEach(post => {
            const postCard = document.createElement('div');
            postCard.className = "p-6 bg-gray-900 border border-gray-800 rounded-xl hover:border-purple-500 transition mb-4";
            
            // This turns "2026-04-13-supernove.md" into "Supernove"
            const title = post.name.replace('.md', '').split('-').slice(3).join(' ') || post.name.replace('.md', '');
            
            postCard.innerHTML = `
                <h2 class="text-2xl font-bold capitalize text-white">${title}</h2>
                <p class="text-gray-500 text-sm mt-1">Published: ${post.name.substring(0,10)}</p>
                <a href="${post.html_url}" target="_blank" class="text-purple-400 mt-4 inline-block font-bold">Read Full Post →</a>
            `;
            
            blogContainer.appendChild(postCard);
        });

    } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').innerText = "Failed to load posts from GitHub.";
    }
}

fetchBlogs();
    </script>
</body>
</html>
