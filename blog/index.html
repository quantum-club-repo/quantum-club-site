<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Insights | GCEK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #030712; color: #f9fafb; }
        .prose h1, .prose h2 { color: #a855f7; font-weight: bold; margin-top: 1.5rem; margin-bottom: 1rem; font-size: 1.5rem; }
        .prose p { margin-bottom: 1rem; color: #d1d5db; line-height: 1.7; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="list-view">
        <nav class="mb-10"><a href="/" class="text-purple-400">← Back to Home</a></nav>
        <h1 class="text-4xl font-black mb-8">Quantum <span class="text-purple-500">Insights</span></h1>
        <div id="blog-list" class="grid gap-4">
            <p class="text-gray-500 italic">Fetching the latest research...</p>
        </div>
    </div>

    <div id="reader-view" class="hidden max-w-3xl mx-auto">
        <nav class="mb-10">
            <button onclick="showList()" class="text-purple-400 font-bold">← Back to All Posts</button>
        </nav>
        <article id="post-content" class="prose prose-invert lg:prose-xl">
            </article>
    </div>

    <script>
        const GITHUB_ORG = 'quantum-club-repo'; 
        const REPO_NAME = 'quantum-club-site';
        
        const blogList = document.getElementById('blog-list');
        const listView = document.getElementById('list-view');
        const readerView = document.getElementById('reader-view');
        const postContent = document.getElementById('post-content');

        // Function to show the list
        function showList() {
            listView.classList.remove('hidden');
            readerView.classList.add('hidden');
            window.scrollTo(0,0);
        }

        // Function to fetch and display a single post
        async function readPost(downloadUrl) {
            listView.classList.add('hidden');
            readerView.classList.remove('hidden');
            postContent.innerHTML = "<p class='text-purple-400 animate-pulse'>Loading content...</p>";

            try {
                const response = await fetch(downloadUrl);
                const markdown = await response.text();
                // Convert Markdown to HTML using Marked.js
                postContent.innerHTML = marked.parse(markdown);
            } catch (err) {
                postContent.innerHTML = "<p class='text-red-500'>Failed to load the post content.</p>";
            }
        }

        async function fetchBlogs() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_ORG}/${REPO_NAME}/contents/blog`);
                const files = await response.json();
                const posts = files.filter(file => file.name.endsWith('.md'));

                if (posts.length === 0) {
                    blogList.innerHTML = "<p class='text-gray-500'>No posts found.</p>";
                    return;
                }

                blogList.innerHTML = ''; 

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = "p-6 bg-gray-900/50 border border-gray-800 rounded-xl hover:border-purple-500 transition cursor-pointer";
                    
                    const displayTitle = post.name.replace('.md', '').split('-').slice(3).join(' ') || post.name.replace('.md', '');

                    card.innerHTML = `
                        <h2 class="text-xl font-bold capitalize">${displayTitle}</h2>
                        <p class="text-gray-500 text-sm mt-1">Click to read on website</p>
                    `;
                    
                    // Trigger the internal reader instead of opening GitHub
                    card.onclick = () => readPost(post.download_url);
                    blogList.appendChild(card);
                });

            } catch (error) {
                blogList.innerHTML = "<p class='text-red-500'>Error connecting to GitHub.</p>";
            }
        }

        fetchBlogs();
    </script>
</body>
</html>
