<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Insights | GCEK</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #030712; 
            color: #f9fafb; 
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* List View Styles */
        .blog-card {
            background: rgba(17, 24, 39, 0.4);
            border: 1px solid #1f2937;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blog-card:hover {
            border-color: #a855f7;
            transform: translateY(-2px);
            background: rgba(17, 24, 39, 0.8);
        }

        /* Reader View Styles */
        .post-title { 
            font-size: 3rem; 
            font-weight: 900; 
            line-height: 1.1; 
            margin-bottom: 1rem; 
            background: linear-gradient(90deg, #a855f7, #ec4899); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .post-meta { 
            color: #9ca3af; 
            font-size: 0.95rem; 
            margin-bottom: 2.5rem; 
            border-bottom: 1px solid #1f2937; 
            padding-bottom: 1.5rem; 
            display: flex;
            gap: 12px;
        }
        .post-body { 
            color: #d1d5db; 
            line-height: 1.8; 
            font-size: 1.15rem; 
        }
        .post-body h1, .post-body h2, .post-body h3 { 
            color: #f9fafb; 
            margin-top: 2rem; 
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .post-body p { margin-bottom: 1.25rem; }
        .post-body code { background: #1f2937; padding: 2px 6px; rounded: 4px; font-size: 0.9em; }
        
        .hidden { display: none; }
        .glass { backdrop-filter: blur(12px); }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass border-b border-gray-800 bg-[#030712]/50 px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="/" class="text-sm font-bold tracking-tighter hover:text-purple-400 transition">QUANTUM CLUB</a>
            <div id="nav-links">
                <button id="back-btn" onclick="showList()" class="hidden text-sm text-purple-400 font-bold">← ALL POSTS</button>
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto">
            
            <div id="list-view">
                <header class="mb-12">
                    <h1 class="text-5xl font-black mb-4">Quantum <span class="text-purple-500">Insights</span></h1>
                    <p class="text-gray-400">Deep dives into electronics, quantum computing, and embedded research.</p>
                </header>

                <div id="blog-list" class="grid gap-6">
                    <div class="animate-pulse flex flex-col gap-4">
                        <div class="h-20 bg-gray-900 rounded-xl"></div>
                        <div class="h-20 bg-gray-900 rounded-xl"></div>
                    </div>
                </div>
            </div>

            <div id="reader-view" class="hidden">
                <article id="post-content" class="post-body">
                    </article>
            </div>

        </div>
    </main>

    <script>
        // CONFIGURATION - Update these to your repo details!
        const GITHUB_ORG = 'quantum-club-repo'; 
        const REPO_NAME = 'quantum-club-site';
        
        const blogList = document.getElementById('blog-list');
        const listView = document.getElementById('list-view');
        const readerView = document.getElementById('reader-view');
        const postContent = document.getElementById('post-content');
        const backBtn = document.getElementById('back-btn');

        function showList() {
            listView.classList.remove('hidden');
            readerView.classList.add('hidden');
            backBtn.classList.add('hidden');
            window.scrollTo(0,0);
        }

        async function readPost(downloadUrl) {
            listView.classList.add('hidden');
            readerView.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            postContent.innerHTML = "<p class='text-purple-400 animate-pulse text-center py-20'>Deciphering data packets...</p>";

            try {
                const response = await fetch(downloadUrl);
                const rawText = await response.text();

                // Separate Frontmatter
                const parts = rawText.split('---');
                let finalMarkdown = rawText;
                let metadata = {};

                if (parts.length >= 3) {
                    const yaml = parts[1];
                    finalMarkdown = parts.slice(2).join('---');
                    yaml.split('\n').forEach(line => {
                        const [key, ...val] = line.split(':');
                        if (key) metadata[key.trim()] = val.join(':').trim();
                    });
                }

                const date = metadata.date ? new Date(metadata.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'Recently Published';

                postContent.innerHTML = `
                    <h1 class="post-title capitalize">${metadata.title || 'Untitled Archive'}</h1>
                    <div class="post-meta">
                        <span>BY ${metadata.author || 'QUANTUM MEMBER'}</span>
                        <span class="text-gray-700">|</span>
                        <span>${date}</span>
                    </div>
                    ${metadata.thumbnail ? `<img src="${metadata.thumbnail}" class="w-full h-auto max-h-[400px] object-cover rounded-3xl mb-12 border border-gray-800 shadow-2xl">` : ''}
                    <div class="prose-content">
                        ${marked.parse(finalMarkdown)}
                    </div>
                `;
                window.scrollTo(0,0);
            } catch (err) {
                postContent.innerHTML = "<p class='text-red-500'>Error: Failed to fetch the post from the server.</p>";
            }
        }

        async function fetchBlogs() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_ORG}/${REPO_NAME}/contents/blog`);
                const files = await response.json();
                const posts = files.filter(file => file.name.endsWith('.md'));

                if (posts.length === 0) {
                    blogList.innerHTML = "<p class='text-gray-600 text-center py-10'>The archives are currently empty.</p>";
                    return;
                }

                blogList.innerHTML = ''; 

                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = "blog-card p-8 rounded-2xl cursor-pointer";
                    
                    // Clean title from filename
                    const displayTitle = post.name.replace('.md', '').split('-').slice(3).join(' ') || post.name.replace('.md', '');

                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 class="text-2xl font-bold capitalize text-white group-hover:text-purple-400 transition">${displayTitle}</h2>
                                <p class="text-gray-500 text-sm mt-2 uppercase tracking-widest">Research Note • View Insight →</p>
                            </div>
                        </div>
                    `;
                    
                    card.onclick = () => readPost(post.download_url);
                    blogList.appendChild(card);
                });

            } catch (error) {
                blogList.innerHTML = "<p class='text-red-500 text-center py-10'>Critical: Unable to reach GitHub API.</p>";
            }
        }

        fetchBlogs();
    </script>
</body>
</html>
