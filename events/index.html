<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events & Workshops | Quantum Club GCEK</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #030712; 
            color: #f9fafb; 
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* Event Card Styles */
        .event-card {
            background: rgba(17, 24, 39, 0.4);
            border: 1px solid #1f2937;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .event-card:hover {
            border-color: #8b5cf6;
            transform: translateY(-5px);
            background: rgba(139, 92, 246, 0.05);
            box-shadow: 0 20px 40px -20px rgba(139, 92, 246, 0.3);
        }

        /* Reader View Styles */
        .event-header-title { 
            font-size: 3.5rem; 
            font-weight: 900; 
            line-height: 1; 
            margin-bottom: 1.5rem; 
            color: #f9fafb;
        }
        .event-badge {
            display: inline-block;
            padding: 4px 12px;
            background: #8b5cf6;
            color: white;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .event-content { 
            color: #d1d5db; 
            line-height: 1.8; 
            font-size: 1.2rem; 
        }
        .event-content h2 { color: #8b5cf6; font-size: 1.75rem; margin-top: 2.5rem; font-weight: 700; }
        .event-content p { margin-bottom: 1.5rem; }
        
        .hidden { display: none; }
        .glass-nav { backdrop-filter: blur(16px); background: rgba(3, 7, 18, 0.7); }
    </style>
</head>
<body class="antialiased">
