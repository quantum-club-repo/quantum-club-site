<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events & Workshops | Quantum Club GCEK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030712; color: #f9fafb; }
        .event-card { background: rgba(17, 24, 39, 0.8); border: 1px solid rgba(139, 92, 246, 0.2); transition: all 0.3s ease; }
        .event-card:hover { border-color: #8b5cf6; transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body class="p-8 md:p-16">

    <nav class="mb-12">
        <a href="/" class="text-purple-400 font-medium flex items-center gap-2 hover:text-purple-300 transition">
            <span>←</span> Back to Home
        </a>
    </nav>

    <header class="mb-16">
        <h1 class="text-4xl md:text-5xl font-black mb-4">Events & <span class="text-purple-500">Workshops</span></h1>
        <p class="text-gray-400 max-w-xl">Explore our past sessions, upcoming expert talks, and hands-on technical workshops at GCE Kannur.</p>
    </header>

    <div id="event-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div id="status" class="text-gray-500 italic col-span-full">Syncing with club database...</div>
    </div>

    <script>
        // Update these two lines!
        const GITHUB_USERNAME = 'your-username'; 
        const REPO_NAME = 'quantum-club-site';
        
        const grid = document.getElementById('event-grid');
        const status = document.getElementById('status');

        async function loadEvents() {
            try {
                // Fetches everything in the 'events' folder
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/events`);
                const data = await response.json();

                // Filters out index.html and non-files
                const eventFiles = data.filter(file => file.name !== 'index.html' && file.type === 'file');

                if (eventFiles.length === 0) {
                    status.innerText = "No events scheduled yet. Check back soon!";
                    return;
                }

                status.remove(); // Clear loading text

                eventFiles.forEach(file => {
                    const card = document.createElement('div');
                    card.className = "event-card p-8 rounded-2xl flex flex-col justify-between";
                    
                    // Clean up filename for display
                    const eventTitle = file.name.replace('.md', '').replace(/-/g, ' ');

                    card.innerHTML = `
                        <div>
                            <div class="w-12 h-12 bg-purple-900/30 rounded-lg flex items-center justify-center mb-6">
                                <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            </div>
                            <h3 class="text-xl font-bold capitalize mb-2">${eventTitle}</h3>
                            <p class="text-gray-500 text-sm mb-6">Technical Session</p>
                        </div>
                        <a href="${file.html_url}" target="_blank" class="text-sm font-bold text-purple-400 hover:text-white transition">
                            VIEW DETAILS →
                        </a>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                status.innerText = "Error loading events. Please ensure the 'events' folder exists on GitHub.";
            }
        }

        loadEvents();
    </script>
</body>
</html>
