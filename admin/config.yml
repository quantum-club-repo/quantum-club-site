backend:
  name: github
  repo: quantum-club-repo/quantum-club-site # Ensure this matches your repo name
  branch: main
  # This MUST be the URL of your second Vercel project (the Gatekeeper)
  base_url: https://quantum-gatekeeper.vercel.app 
  auth_endpoint: /auth

# Fixes: 'media_folder' and 'media_library' errors
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# Required for the CMS to actually show you an interface
collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "events"
    label: "Events"
    folder: "content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "body", widget: "markdown" }
